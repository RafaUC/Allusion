# This is the config for the github actions that creates new releases
name: Build/release

on:
  workflow_dispatch:
  # Create a release for tag pushes starting with 'v'
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install setuptools (fix for distutils error)
        run: pip3 install setuptools --break-system-packages
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build/release Electron app
        uses: electron-userland/action-electron-builder@v1

        with:
          # GitHub token, automatically provided to the action
          # (No need to define this secret in the repo settings)
          github_token: ${{ secrets.github_token }}

          # If the commit is tagged with a version (e.g. "v1.0.0"),
          # release the app after building
          release: ${{ startsWith(github.ref, 'refs/tags/v') }}